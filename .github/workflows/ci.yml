name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: corepack pnpm install --frozen-lockfile

      - run: corepack pnpm build

      - run: corepack pnpm typecheck

      - run: corepack pnpm test

      - run: corepack pnpm lint:md-snippets

      - run: corepack pnpm demo:test

      - run: corepack pnpm package:smoke
